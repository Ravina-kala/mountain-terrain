<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mountain Terrain Viewer</title>
<style>
  body{margin:0;background:#0b0a08;color:#d4c9b0;font-family:Georgia,serif;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       min-height:100vh;padding:40px 20px;}
  h1{font-size:2rem;font-weight:300;color:rgb(200,165,80);letter-spacing:0.1em;margin-bottom:8px;}
  p{color:rgba(170,155,120,0.7);font-size:0.85rem;margin-bottom:40px;}
  .peaks{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:800px;}
  a{display:block;padding:18px 28px;border:1px solid rgba(140,120,80,0.35);
     text-decoration:none;color:rgb(210,198,170);border-radius:2px;
     transition:all 0.2s;font-size:1.1rem;}
  a:hover{border-color:rgb(200,165,80);color:rgb(220,185,90);background:rgba(140,120,80,0.08);}
  .elev{display:block;font-size:0.72rem;color:rgba(170,155,120,0.6);
         font-family:monospace;margin-top:4px;letter-spacing:0.04em;}
</style>
</head>
<body>
<h1>🏔 Mountain Terrain Viewer</h1>
<p>3D expedition familiarization · COP30 30m DEM · Interactive terrain analysis</p>
<div class="peaks" id="peaks"></div>
<script>
const peaks = [
  { name: "black peak", slug: "black_peak", alt: "6281m" },
];
const el = document.getElementById('peaks');
peaks.forEach(p => {
  el.innerHTML += `<a href="./${p.slug}/"><span>${p.name}</span><span class="elev">${p.alt}</span></a>`;
});
</script>
</body>
</html>
